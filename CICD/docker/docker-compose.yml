services:
  mariadb:
    image: mariadb:11.4
    container_name: stockit-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: stockit
      MARIADB_USER: stockit
      MARIADB_PASSWORD: change-me
      MARIADB_ROOT_PASSWORD: change-root-me
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ../..
      dockerfile: CICD/docker/Dockerfile
    image: pbgodsoo/stockit-be:latest
    container_name: stockit-be
    restart: unless-stopped
    mem_limit: 4g
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms1g -Xmx2g"
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mariadb://mariadb:3306/stockit
      DB_USER: stockit
      DB_PASS: change-me
      # HS256 은 32 byte 이상 필요. 배포 전 반드시 교체.
      JWT_SECRET: change-me-stockit-jwt-secret-please-replace-with-64-byte-random-string
      JWT_ACCESS_EXPIRATION_MS: "3600000"
      JWT_REFRESH_EXPIRATION_MS: "604800000"
      # 미설정 시 AI 거래처 추천 호출만 401 (BE 부팅은 OK)
      OPENAI_API_KEY: ""
    ports:
      - "8080:8080"

volumes:
  mariadb-data:
