apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockit-be-green
  namespace: default
  labels:
    app: stockit-be
    color: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stockit-be
      color: green
  template:
    metadata:
      labels:
        app: stockit-be
        color: green
    spec:
      containers:
        - name: stockit-be
          image: sunyeoplee/stockit-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: stockit-be-config
                  key: db-url
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: db-pass
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: jwt-secret
            - name: JWT_ACCESS_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: stockit-be-config
                  key: jwt-access-expiration-ms
            - name: JWT_REFRESH_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: stockit-be-config
                  key: jwt-refresh-expiration-ms
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: openai-api-key
            - name: PUBLIC_DATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: public-data-api-key
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
