apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockit-be-green
  namespace: default
  labels:
    app: stockit-be
    color: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stockit-be
      color: green
  template:
    metadata:
      labels:
        app: stockit-be
        color: green
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.istio.io/merge-metrics: "true"
    spec:
      terminationGracePeriodSeconds: 25
      containers:
        - name: stockit-be
          image: sunyeoplee/stockit-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: stockit-be-config
                  key: db-url
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: db-pass
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: jwt-secret
            - name: JWT_ACCESS_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: stockit-be-config
                  key: jwt-access-expiration-ms
            - name: JWT_REFRESH_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: stockit-be-config
                  key: jwt-refresh-expiration-ms
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: openai-api-key
            - name: PUBLIC_DATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockit-be-secret
                  key: public-data-api-key
            - name: DB_POOL_MAX
              value: "5"
            - name: DB_POOL_MIN_IDLE
              value: "1"
            - name: DB_CONNECTION_TIMEOUT_MS
              value: "10000"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 7
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 1536Mi
            limits:
              cpu: 500m
              memory: 4Gi
