# MariaDB inventory → ES `inventory` 인덱스 동기화
# 운영의 stockit-elk-k8s/06-logstash-pipeline.yaml 을 quickstart 용으로 단순화
# (SSL/auth 제거, 30초 폴링, soft-delete 패턴 미적용 — 기본 sql_last_value 증분만)

input {
  jdbc {
    jdbc_driver_library    => "/usr/share/logstash/drivers/mariadb-java-client.jar"
    jdbc_driver_class      => "org.mariadb.jdbc.Driver"
    jdbc_connection_string => "${DB_URL}"
    jdbc_user              => "${DB_USER}"
    jdbc_password          => "${DB_PASS}"

    schedule => "*/30 * * * * *"

    statement => "
      SELECT
        i.id                        AS id,
        i.sku_id                    AS sku_id,
        i.location_id               AS location_id,
        i.inventory_status          AS inventory_status,
        i.quantity                  AS quantity,
        i.available_quantity        AS available_quantity,
        i.reserved_quantity         AS reserved_quantity,
        i.in_transit_quantity       AS in_transit_quantity,
        i.status_changed_at         AS status_changed_at,
        i.last_movement_at          AS last_movement_at,
        i.update_date               AS update_date,
        ps.sku_code                 AS sku_code,
        ps.color                    AS color,
        ps.size                     AS size,
        ps.unit_price               AS unit_price,
        pm.code                     AS product_code,
        pm.name                     AS product_name,
        pm.warehouse_safety_stock   AS warehouse_safety_stock,
        pm.store_safety_stock       AS store_safety_stock,
        inf.code                    AS location_code,
        inf.name                    AS location_name,
        inf.location_type           AS location_type,
        inf.region                  AS location_region,
        cc.code                     AS child_category_code,
        cc.name                     AS child_category,
        pc.code                     AS parent_category_code,
        COALESCE(pc.name, cc.name)  AS parent_category
      FROM inventory i
      JOIN product_sku    ps  ON ps.id   = i.sku_id
      JOIN product_master pm  ON pm.code = ps.product_code
      JOIN infrastructure inf ON inf.id  = i.location_id
      LEFT JOIN category cc ON cc.code   = pm.category_code
      LEFT JOIN category pc ON pc.id     = cc.parent_id
      WHERE i.id > :sql_last_value
      ORDER BY i.id ASC
      LIMIT 5000
    "

    use_column_value       => true
    tracking_column        => "id"
    tracking_column_type   => "numeric"
    last_run_metadata_path => "/usr/share/logstash/data/.jdbc_last_run_inventory"

    jdbc_paging_enabled => false
    jdbc_fetch_size     => 1000

    tags => ["inventory"]
  }
}

filter {
  mutate {
    remove_field => ["@version", "@timestamp", "tags"]
  }
}

output {
  elasticsearch {
    hosts       => ["${ES_HOSTS}"]
    index       => "inventory"
    document_id => "%{id}"
    action      => "index"
  }
}
