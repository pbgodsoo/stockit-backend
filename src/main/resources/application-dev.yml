spring:
  application:
    name: spring_fullstack

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:15000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD_MS:20000}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  # ADR-021 AI 거래처 추천 — 임베딩(text-embedding-3-small) + 추천 사유(gpt-4o-mini)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        options:
          model: gpt-4o-mini

logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: info

# SYS-001 본사 발주 자동 전환 배치
purchase-order:
  batch:
    delay-ms: 300000      # 스케줄러 fixedDelay (5분)
    wait-minutes: 1       # dev 에선 짧게 (시연·테스트 편의)


jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}


esg:
  carbon-api:
    base-url: https://apis.data.go.kr/1160100/service/GetGeneralProductInfoService
    service-key: ${PUBLIC_DATA_API_KEY}
    target-symbol: KAU25       # 현재 거래 활성 종목
    fallback-price: 9200

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    elasticsearch:
      enabled: false

admin:
  bootstrap:
    password: ${ADMIN_BOOTSTRAP_PASSWORD}

stockit:
  circular-buyer:
    ai:
      embedding-timeout-ms: 15000
      rationale-timeout-ms: 60000
  elasticsearch:
    host: ${ES_HOST}
    port: ${ES_PORT}
    user: ${ES_USER}
    password: ${ES_PASSWORD}
    circular-buyer-index: ${ES_CIRCULAR_BUYER_INDEX:circular-buyer-v1}
