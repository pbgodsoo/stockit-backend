spring:
  application:
    name: spring_fullstack

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:15000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD_MS:20000}

  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.MariaDBDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  batch:
    job:
      enabled: false        # 서버 시작 시 Job 자동 실행 방지 (운영 데이터 보호)
    jdbc:
      initialize-schema: always        # BATCH_ 메타 테이블 6개 자동 생성

  sql:
    init:
      mode: always
      schema-locations: classpath:db/shedlock.sql   # 배치 관련 테이블 자동 생성

  # ADR-021 AI 거래처 추천 — 임베딩(text-embedding-3-small) + 추천 사유(Gemini)
  ai:
    model:
      chat: none
      embedding: openai
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small

logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: info
    # SSE 생명주기 가시화 — 로컬 개발 시 subscribe/unsubscribe/onCompletion 등 흐름 추적용.
    # 운영(prod) 에서는 기본 INFO 라 조용. 운영 진단 필요 시 actuator/loggers 로 런타임 토글:
    #   curl -X POST host/actuator/loggers/org.example.stockitbe.notification \
    #     -H 'Content-Type: application/json' -d '{"configuredLevel":"DEBUG"}'
    org.example.stockitbe.notification: debug

# SYS-001 본사 발주 자동 전환 배치
purchase-order:
  batch:
    delay-ms: ${PURCHASE_ORDER_BATCH_DELAY_MS:300000}      # 스케줄러 fixedDelay (5분)
    wait-minutes: 1       # dev 에선 짧게 (시연·테스트 편의)

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}


esg:
  carbon-api:
    base-url: https://apis.data.go.kr/1160100/service/GetGeneralProductInfoService
    service-key: ${PUBLIC_DATA_API_KEY}
    target-symbol: KOC25-30    # 외부사업 인증실적 (Korean Offset Credit, 2025년물·2030 만기) — KAU25 와 동시기물
    fallback-price: 13000      # KOC25-30 최근 종가 기준

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    elasticsearch:
      enabled: false

admin:
  bootstrap:
    password: ${ADMIN_BOOTSTRAP_PASSWORD}

stockit:
  circular-buyer:
    ai:
      embedding-timeout-ms: 15000
      rationale-timeout-ms: 60000
      gemini:
        api-key: ${GEMINI_API_KEY:}
        model: ${GEMINI_MODEL:gemini-3.5-flash}
        base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  elasticsearch:
    host: ${ES_HOST}
    port: ${ES_PORT}
    user: ${ES_USER}
    password: ${ES_PASSWORD}
    circular-buyer-index: ${ES_CIRCULAR_BUYER_INDEX:circular-buyer-search}
    sync:
      enabled: ${ES_SYNC_ENABLED:false}
      embedding-model: ${ES_SYNC_EMBEDDING_MODEL:text-embedding-3-small}
      embedding-version: ${ES_SYNC_EMBEDDING_VERSION:1}
      retry:
        interval-ms: ${ES_SYNC_RETRY_INTERVAL_MS:30000}
        base-delay-ms: ${ES_SYNC_RETRY_BASE_DELAY_MS:30000}
        max-attempts: ${ES_SYNC_RETRY_MAX_ATTEMPTS:8}
        batch-size: ${ES_SYNC_RETRY_BATCH_SIZE:100}
